services:
  - type: web
    name: appifylab-backend
    env: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        value: https://buddy-script-brown.vercel.app
      - key: COOKIE_SAME_SITE
        value: none
      - key: COOKIE_NAME
        value: appifylab_token
      - key: CSRF_COOKIE_NAME
        value: appifylab_csrf
      - key: MAX_FILE_SIZE_MB
        value: "5"
      - key: UPLOAD_DIR
        value: uploads
